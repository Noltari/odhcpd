name: odhcpd

on:
  pull_request:
  push:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86-64

    steps:
      - name: Checkout odhcpd
        uses: actions/checkout@v5

      - name: Patch Makefile
        run: |
          sed -i -e 's#@GITHUB_SHA@#${{ github.sha }}#g' ${{ github.workspace }}/feed/ci-odhcpd/Makefile

      - name: Build odhcpd
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: packages_ci
          PACKAGES: ci-odhcpd
          V: s

      - name: Move packages
        run: cp bin/packages/${{ matrix.arch }}/packages_ci/* . || true

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch}}-packages
          path: |
            *.ipk
            *.apk

      - name: Store logs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch}}-logs
          path: logs/
